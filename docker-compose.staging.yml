version: '3'

services:
  web:
    build: .
    command:
      - bash
      - -c
      - |
        python manage.py migrate --noinput
        python manage.py collectstatic --noinput --clear
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload
    volumes:
      - ./:/usr/src/app/
      - ../logs:/usr/src/app/logs/
    ports:
      - 8000:8000
    env_file:
      - ./.env
    environment:
      TZ: "Asia/Seoul"
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - web
